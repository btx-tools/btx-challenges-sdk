name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        # pnpm version resolves from package.json `packageManager` field.

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Must run BEFORE type-check so workspace packages
        # (e.g. middleware-express) can resolve @btx-tools/challenges-sdk
        # types from core's dist/ output.
        run: pnpm -r build

      - name: Type-check
        run: pnpm -r type-check

      - name: Format check (prettier)
        # Audit finding G-4. Single non-empty glob over packages/** — prettier
        # exits 2 if ANY glob arg matches zero files, so the earlier two-arg form
        # (src + tests) re-broke whenever a package lacked one of those dirs
        # (audit M-3, 2026-05-23). One `**/*.ts` glob always matches; dist/.d.ts
        # + node_modules are excluded via .prettierignore, and examples/ is
        # outside the packages/** scope.
        run: pnpm exec prettier --check "packages/**/*.ts"

      - name: Pack dry-run
        # Audit finding G-3. Surfaces publish-time tarball issues (oversized
        # files, missing dist, accidentally-included secrets) in CI rather
        # than at publish.
        run: pnpm -r exec pnpm pack --dry-run

      - name: Unit tests
        # Run unit tests across ALL workspace packages (core + middleware-express).
        # Integration tests need a live btxd + SSH access (not available in CI
        # runners) — only the unit suite runs here. To run integration tests
        # locally, see packages/core/tests/integration/solve-redeem.test.ts for
        # the BTX_INTEGRATION_* gate variables.
        run: pnpm -r test:unit -- --reporter=verbose

      - name: Perf regression gate (audit F-5)
        # Core-only perf bench. Runs on Node 22 (latest in matrix) to keep the
        # baseline consistent — earlier Node versions have different V8 JIT
        # characteristics. Ceilings are generous (~5× local M-series baseline)
        # to absorb GitHub Actions runner variance. Failures here indicate a
        # ≥20% regression in the matmul hot loop or compression-coeff derivation;
        # investigate before merging. See packages/core/tests/perf/bench.test.ts.
        if: matrix.node-version == 22
        run: pnpm --filter @btx-tools/challenges-sdk run test:perf
