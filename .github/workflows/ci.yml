name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm -r type-check

      - name: Build
        run: pnpm -r build

      - name: Unit tests
        # Integration tests need a live btxd + SSH access (not available
        # in CI runners) — only the unit suite runs here. To run
        # integration tests locally, see tests/integration/solve-redeem.test.ts
        # header for the BTX_INTEGRATION_* gate variables.
        run: pnpm -r --filter '@btx-tools/challenges-sdk' test:unit -- --reporter=verbose
