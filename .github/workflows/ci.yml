name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        # pnpm version resolves from package.json `packageManager` field.

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Must run BEFORE type-check so workspace packages
        # (e.g. middleware-express) can resolve @btx-tools/challenges-sdk
        # types from core's dist/ output.
        run: pnpm -r build

      - name: Type-check
        run: pnpm -r type-check

      - name: Format check (prettier)
        # Audit finding G-4. Catches style drift before it lands on main.
        run: pnpm -r exec prettier --check "src/**/*.ts" "tests/**/*.ts"

      - name: Pack dry-run
        # Audit finding G-3. Surfaces publish-time tarball issues (oversized
        # files, missing dist, accidentally-included secrets) in CI rather
        # than at publish.
        run: pnpm -r exec pnpm pack --dry-run

      - name: Unit tests
        # Run unit tests across ALL workspace packages (core + middleware-express).
        # Integration tests need a live btxd + SSH access (not available in CI
        # runners) — only the unit suite runs here. To run integration tests
        # locally, see packages/core/tests/integration/solve-redeem.test.ts for
        # the BTX_INTEGRATION_* gate variables.
        run: pnpm -r test:unit -- --reporter=verbose
